<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 / 注册 — online-chat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <main class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
      </span>
      <h1>online-chat</h1>
    </div>
    <p class="auth-sub">网页版即时聊天工具</p>

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="form-login">登录</button>
      <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" aria-controls="form-register">注册</button>
    </div>

    <!-- 登录表单 -->
    <form class="auth-form active" id="form-login" novalidate>
      <div class="field">
        <label for="login-email">邮箱</label>
        <input type="email" id="login-email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="login-password">密码</label>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="请输入密码" required>
      </div>
      <p class="error-text" id="login-error" role="alert"></p>
      <button type="submit" class="btn btn-primary btn-block" id="login-submit">登 录</button>
    </form>

    <!-- 注册表单 -->
    <form class="auth-form" id="form-register" novalidate>
      <div class="field">
        <label for="reg-email">邮箱</label>
        <input type="email" id="reg-email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="reg-code">邮箱验证码</label>
        <div class="field-row">
          <input type="text" id="reg-code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="6 位验证码" required>
          <button type="button" class="btn btn-ghost" id="send-code-btn">发送验证码</button>
        </div>
      </div>
      <div class="field">
        <label for="reg-password">密码</label>
        <input type="password" id="reg-password" autocomplete="new-password" placeholder="至少 6 位" minlength="6" required>
      </div>
      <div class="field">
        <label for="reg-nickname">昵称（选填）</label>
        <input type="text" id="reg-nickname" autocomplete="nickname" maxlength="64" placeholder="默认取邮箱前缀">
      </div>
      <p class="error-text" id="reg-error" role="alert"></p>
      <button type="submit" class="btn btn-cta btn-block" id="reg-submit">注 册</button>
    </form>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
