<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理面板 — online-chat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-page">

  <div class="admin-container">
    <header class="admin-header">
      <h1>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:26px;height:26px;color:var(--primary);">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
        </svg>
        超管管理面板 · 全部群聊
      </h1>
      <div style="display:flex;gap:8px;">
        <a href="chat.html" class="btn btn-ghost btn-sm" style="text-decoration:none;">返回聊天</a>
        <button class="btn btn-ghost btn-sm" id="btn-refresh">刷新</button>
      </div>
    </header>

    <div class="admin-card">
      <div class="table-wrap">
        <table class="admin-table" aria-label="全部群聊列表">
          <thead>
            <tr>
              <th>ID</th>
              <th>群名称</th>
              <th>群主</th>
              <th>成员数</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="group-table-body">
            <tr><td colspan="6" class="empty-state">加载中…</td></tr>
          </tbody>
        </table>
      </div>
      <footer class="admin-footer">
        <span class="pager-info" id="total-info"></span>
        <div class="pager" style="margin-top:0;">
          <button class="btn btn-ghost btn-sm" id="btn-prev">上一页</button>
          <span class="pager-info" id="page-info">1 / 1</span>
          <button class="btn btn-ghost btn-sm" id="btn-next">下一页</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
