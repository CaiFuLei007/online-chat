# ============================================================================
# online-chat 本地开发环境
#
# 启动：cd docker && docker compose up -d
# 停止：cd docker && docker compose down
# 清除数据（重建）：docker compose down -v
#
# 端口映射：
#   3306  MySQL（宿主机可直连调试）
#   6379  Redis
#   8080  应用 HTTP/WS
# ============================================================================

services:
  # ---- MySQL ----
  mysql:
    image: mysql:8.0
    container_name: oc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd_dev
      MYSQL_DATABASE: online_chat
      MYSQL_USER: online_chat
      MYSQL_PASSWORD: online_chat_pwd
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pwd_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: oc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- 应用 ----
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: oc-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 敏感配置通过环境变量注入，不进 config.json
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me-in-production}"
      SMTP_HOST: "${SMTP_HOST:-smtp.example.com}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-noreply@example.com}"
    ports:
      - "8080:8080"
    volumes:
      # 开发时挂载前端目录，热更新无需重建镜像
      - ../frontend:/app/frontend:ro

volumes:
  mysql_data:
  redis_data:
